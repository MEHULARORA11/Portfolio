name: server-application-a

services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    deploy:
      replicas: 5
    networks:
      - internal-a

  caddy:
    image: caddy:latest
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.my-router.rule=Host(`excloud.mehularora.dev`)'
      - 'traefik.http.services.my-router.loadbalancer.server.port=80'
      - 'traefik.http.routers.my-router.entrypoints=websecure'
      - 'traefik.docker.network=project-a-network'
      - 'traefik.http.routers.my-router.tls=true'
      - 'traefik.http.routers.my-router.tls.certresolver=cert-resolver'
    networks:
      - project-a-network
      - internal-a

networks:
  internal-a:
    driver: bridge
  project-a-network:
    external: true
